<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Luồng tạo nhân sự</title>
  <desc id="desc">Hình minh họa luồng tạo tài khoản nhân sự mới.</desc>
  <rect width="960" height="420" rx="24" fill="#f5f7fb"/>
  <rect x="46" y="42" width="868" height="336" rx="18" fill="#ffffff" stroke="#d8e0eb"/>
  <text x="78" y="92" font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#121826">Tạo nhân sự mới</text>
  <g font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="16">
    <rect x="92" y="148" width="164" height="96" rx="16" fill="#eef4ff" stroke="#0b73e8"/>
    <text x="118" y="184" font-weight="700" fill="#0b73e8">1. IT tạo</text>
    <text x="118" y="214" fill="#121826">Email Microsoft</text>
    <rect x="292" y="148" width="164" height="96" rx="16" fill="#eaf8f0" stroke="#177245"/>
    <text x="318" y="184" font-weight="700" fill="#177245">2. Giám đốc</text>
    <text x="318" y="214" fill="#121826">mở mẫu nhập tài khoản</text>
    <rect x="492" y="148" width="164" height="96" rx="16" fill="#eaf8f0" stroke="#177245"/>
    <text x="518" y="184" font-weight="700" fill="#177245">3. Chọn vai trò</text>
    <text x="518" y="214" fill="#121826">đúng phạm vi</text>
    <rect x="692" y="148" width="164" height="96" rx="16" fill="#fff4de" stroke="#b26a00"/>
    <text x="718" y="184" font-weight="700" fill="#b26a00">4. Nhân sự đăng nhập</text>
    <text x="718" y="214" fill="#121826">bằng Microsoft</text>
  </g>
  <text x="108" y="310" font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="15" fill="#5f6b7a">Giám đốc chỉ tạo vai trò được phép. Đổi vai trò, trạng thái hoạt động và cơ sở do IT/super_admin xử lý.</text>
</svg>
