<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Luồng duyệt KPI</title>
  <desc id="desc">Hình minh họa các trạng thái KPI: nháp, đã nộp, đã xác nhận và đã duyệt.</desc>
  <rect width="960" height="420" rx="24" fill="#f5f7fb"/>
  <rect x="38" y="38" width="884" height="344" rx="18" fill="#ffffff" stroke="#d8e0eb"/>
  <text x="70" y="88" font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#121826">Luồng KPI</text>
  <g font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="16">
    <rect x="92" y="150" width="154" height="88" rx="16" fill="#eef4ff" stroke="#0b73e8"/>
    <text x="124" y="185" font-weight="700" fill="#0b73e8">Nháp</text>
    <text x="124" y="214" fill="#5f6b7a">Nhân sự/Kế toán</text>
    <rect x="296" y="150" width="154" height="88" rx="16" fill="#eef4ff" stroke="#0b73e8"/>
    <text x="328" y="185" font-weight="700" fill="#0b73e8">Đã nộp</text>
    <text x="328" y="214" fill="#5f6b7a">Nhân sự/Quản lý</text>
    <rect x="500" y="150" width="154" height="88" rx="16" fill="#fff4de" stroke="#b26a00"/>
    <text x="532" y="185" font-weight="700" fill="#b26a00">Đã xác nhận</text>
    <text x="532" y="214" fill="#5f6b7a">Quản lý/Giám đốc</text>
    <rect x="704" y="150" width="154" height="88" rx="16" fill="#eaf8f0" stroke="#177245"/>
    <text x="736" y="185" font-weight="700" fill="#177245">Đã duyệt</text>
    <text x="736" y="214" fill="#5f6b7a">Giám đốc</text>
  </g>
  <g stroke="#8a96a8" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M250 194h40"/><path d="M454 194h40"/><path d="M658 194h40"/>
  </g>
  <rect x="216" y="292" width="528" height="52" rx="14" fill="#fff0ee" stroke="#b42318"/>
  <text x="246" y="325" font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#b42318">Người xác nhận và người duyệt phải khác nhau.</text>
</svg>
