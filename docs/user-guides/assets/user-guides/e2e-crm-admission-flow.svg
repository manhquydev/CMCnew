<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Luồng tuyển sinh trong CRM</title>
  <desc id="desc">Hình minh họa an toàn dữ liệu cho luồng từ khách mới đến test, phiếu thu, ghi danh và chăm sóc sau bán.</desc>
  <rect width="960" height="420" rx="24" fill="#f5f7fb"/>
  <rect x="34" y="34" width="892" height="352" rx="18" fill="#ffffff" stroke="#d8e0eb"/>
  <text x="62" y="82" font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#121826">Từ khách mới đến ghi danh</text>
  <text x="62" y="112" font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="16" fill="#5f6b7a">Dùng hình đã ẩn dữ liệu cho CRM và tài chính. Không đưa tên, số điện thoại hoặc mã phiếu vào tài liệu.</text>
  <g font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    <rect x="70" y="154" width="128" height="74" rx="14" fill="#eef4ff" stroke="#0b73e8"/>
    <text x="92" y="184" fill="#0b73e8">O1 Khách mới</text>
    <text x="92" y="206" fill="#5f6b7a" font-weight="400">Kiểm tra trùng</text>
    <rect x="232" y="154" width="128" height="74" rx="14" fill="#eef4ff" stroke="#0b73e8"/>
    <text x="254" y="184" fill="#0b73e8">O2 Tư vấn</text>
    <text x="254" y="206" fill="#5f6b7a" font-weight="400">Ghi chú tư vấn</text>
    <rect x="394" y="154" width="128" height="74" rx="14" fill="#eef4ff" stroke="#0b73e8"/>
    <text x="416" y="184" fill="#0b73e8">O3 Test đầu vào</text>
    <text x="416" y="206" fill="#5f6b7a" font-weight="400">Đặt lịch test</text>
    <rect x="556" y="154" width="128" height="74" rx="14" fill="#fff4de" stroke="#b26a00"/>
    <text x="578" y="184" fill="#b26a00">O4 Phiếu thu</text>
    <text x="578" y="206" fill="#5f6b7a" font-weight="400">Kế toán xử lý</text>
    <rect x="718" y="154" width="128" height="74" rx="14" fill="#eaf8f0" stroke="#177245"/>
    <text x="740" y="184" fill="#177245">O5 Ghi danh</text>
    <text x="740" y="206" fill="#5f6b7a" font-weight="400">Vào lớp</text>
  </g>
  <g stroke="#8a96a8" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M202 191h24"/><path d="M364 191h24"/><path d="M526 191h24"/><path d="M688 191h24"/>
  </g>
  <g font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="15">
    <rect x="118" y="282" width="220" height="46" rx="12" fill="#f4f9ff" stroke="#d8e0eb"/>
    <text x="140" y="311" fill="#121826">Sale cập nhật O1-O5</text>
    <rect x="370" y="282" width="220" height="46" rx="12" fill="#f4f9ff" stroke="#d8e0eb"/>
    <text x="392" y="311" fill="#121826">Giáo viên chấm test</text>
    <rect x="622" y="282" width="220" height="46" rx="12" fill="#f4f9ff" stroke="#d8e0eb"/>
    <text x="644" y="311" fill="#121826">CSKH chăm sóc sau bán</text>
  </g>
</svg>
