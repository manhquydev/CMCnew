<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Luồng chấm test đầu vào</title>
  <desc id="desc">Hình minh họa luồng đặt lịch và chấm test đầu vào.</desc>
  <rect width="960" height="420" rx="24" fill="#f5f7fb"/>
  <rect x="42" y="42" width="876" height="336" rx="18" fill="#ffffff" stroke="#d8e0eb"/>
  <text x="74" y="92" font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#121826">Luồng test đầu vào</text>
  <g font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="16">
    <rect x="106" y="150" width="180" height="100" rx="16" fill="#eef4ff" stroke="#0b73e8"/>
    <text x="132" y="188" font-weight="700" fill="#0b73e8">1. Sale đặt lịch</text>
    <text x="132" y="218" fill="#5f6b7a">Từ CRM</text>
    <rect x="390" y="150" width="180" height="100" rx="16" fill="#eaf8f0" stroke="#177245"/>
    <text x="416" y="188" font-weight="700" fill="#177245">2. GV chấm</text>
    <text x="416" y="218" fill="#5f6b7a">Nhập điểm, nhận xét</text>
    <rect x="674" y="150" width="180" height="100" rx="16" fill="#fff4de" stroke="#b26a00"/>
    <text x="700" y="188" font-weight="700" fill="#b26a00">3. Sale tư vấn</text>
    <text x="700" y="218" fill="#5f6b7a">Lớp học/program fit</text>
  </g>
  <g stroke="#8a96a8" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M290 200h94"/><path d="M574 200h94"/>
  </g>
  <text x="156" y="320" font-family="Be Vietnam Pro, Noto Sans, Segoe UI, Arial, sans-serif" font-size="15" fill="#5f6b7a">Sale không chấm test. Giáo viên không tạo phiếu thu. Mỗi vai trò làm đúng phần việc của mình.</text>
