<!-- Scripts for UI Interactions -->
<script>
        function switchTab(type) {
            const btnParent = document.getElementById('btn-parent');
            const btnStudent = document.getElementById('btn-student');
            const formParent = document.getElementById('form-parent');
            const formStudent = document.getElementById('form-student');

            if (type === 'parent') {
                btnParent.classList.add('text-primary', 'tab-active');
                btnParent.classList.remove('text-on-surface-variant', 'opacity-60');
                
                btnStudent.classList.remove('text-primary', 'tab-active');
                btnStudent.classList.add('text-on-surface-variant', 'opacity-60');

                formStudent.classList.add('hidden', 'opacity-0', 'translate-x-8');
                formParent.classList.remove('hidden');
                setTimeout(() => {
                    formParent.classList.remove('opacity-0', 'translate-x-8');
                    formParent.classList.add('opacity-100', 'translate-x-0');
                }, 50);
            } else {
                btnStudent.classList.add('text-primary', 'tab-active');
                btnStudent.classList.remove('text-on-surface-variant', 'opacity-60');
                
                btnParent.classList.remove('text-primary', 'tab-active');
                btnParent.classList.add('text-on-surface-variant', 'opacity-60');

                formParent.classList.add('hidden', 'opacity-0', 'translate-x-8');
                formStudent.classList.remove('hidden');
                setTimeout(() => {
                    formStudent.classList.remove('opacity-0', 'translate-x-8');
                    formStudent.classList.add('opacity-100', 'translate-x-0');
                }, 50);
            }
        }
    </script>
