# Jenkins Configuration-as-Code. Reproducible single-node CI. Secrets via /root/jenkins.env.
jenkins:
  systemMessage: "CMCnew CI/CD - single-node. main -> build -> test -> deploy (compose) -> migrate -> smoke."
  numExecutors: 1
  scmCheckoutRetryCount: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: github-token
              username: manhquydev
              password: "${GITHUB_TOKEN}"
              description: "GitHub PAT (SCM + checks)"

unclassified:
  location:
    # Public URL (behind the nginx ci.cmcvn.edu.vn vhost) so build links + github-checks
    # target_url resolve for humans. Jenkins itself still listens on 127.0.0.1:8080.
    url: "https://ci.cmcvn.edu.vn/"

jobs:
  - script: |
      multibranchPipelineJob('cmcnew') {
        branchSources {
          branchSource {
            source {
              github {
                id('cmcnew-gh')
                repoOwner('manhquydev')
                repository('CMCnew')
                repositoryUrl('https://github.com/manhquydev/CMCnew.git')
                credentialsId('github-token')
                configuredByUrl(true)
                traits {
                  gitHubBranchDiscovery { strategyId(1) }
                  // strategyId(2) = build the PR head commit directly (no synthetic merge with
                  // the target branch). Required for publishChecks: strategyId(1) checks out an
                  // ephemeral merge SHA never pushed to GitHub, so a check posted against it
                  // 404s silently inside catchError — the required-check gate can't work with
                  // strategyId(1).
                  gitHubPullRequestDiscovery { strategyId(2) }
                }
              }
            }
          }
        }
        factory { workflowBranchProjectFactory { scriptPath('Jenkinsfile') } }
        orphanedItemStrategy { discardOldItems { numToKeep(20) } }
        triggers { periodicFolderTrigger { interval('5m') } }
      }
