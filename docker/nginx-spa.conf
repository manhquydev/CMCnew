# Inner nginx config for each SPA container (admin, teaching, lms).
# The outer reverse proxy strips the path prefix before forwarding here,
# so all three apps can use identical configs serving from root "/".

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # CRM opportunity links include a dynamic id, but preview bots still need
    # the static CRM opportunity metadata before the JavaScript router loads.
    location ~ ^/crm/opportunities/ {
        try_files /crm/opportunities/index.html /index.html;
    }

    # SPA fallback — let the JS router handle unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite outputs content-hashed filenames; cache forever
    location ~* \.(js|css|woff|woff2|ttf|eot|svg|png|ico|webp|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;
}
