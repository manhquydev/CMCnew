# CMCnew — production docker-compose
#
# Run from the repo root:
#   cp .env.production.example .env.production
#   # Edit .env.production with real secrets
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production up -d
#
# ── First-deploy checklist ─────────────────────────────────────────────────────
# 1. Start postgres:
#      docker compose -f docker/docker-compose.prod.yml --env-file .env.production \
#        up -d postgres
# 2. Run migrations (creates schema + cmc_app role via migration SQL):
#      docker compose -f docker/docker-compose.prod.yml --env-file .env.production \
#        run --rm api-migrate
# 3. Seed the super-admin (idempotent):
#      docker compose -f docker/docker-compose.prod.yml --env-file .env.production \
#        run --rm api-seed
# 4. Start all services:
#      docker compose -f docker/docker-compose.prod.yml --env-file .env.production \
#        up -d
# ──────────────────────────────────────────────────────────────────────────────
#
# Security note: the cmc_app role password is set in migration
# 20260623045316_rls_tenancy ('cmc_app' by default). Change it post-migrate:
#   docker exec -it <postgres-container> psql -U ${DB_USER} -d ${DB_NAME} \
#     -c "ALTER ROLE cmc_app PASSWORD '<new-password>';"
# Then update DATABASE_URL accordingly.

name: cmcnew-prod

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${DB_USER:-cmc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB:       ${DB_NAME:-cmc}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-cmc} -d ${DB_NAME:-cmc}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis (session store / pub-sub for SSE notifications) ──────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── API (Hono + tRPC, runs with tsx — no separate compile step) ─────────────
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV:         production
      API_PORT:         4000
      # Runtime: connects as non-owner cmc_app role so RLS policies apply.
      # cmc_app is created by migration 20260623045316_rls_tenancy.
      DATABASE_URL:     postgresql://cmc_app:${DB_APP_PASSWORD:?DB_APP_PASSWORD is required}@postgres:5432/${DB_NAME:-cmc}?schema=public
      # Owner role: used by prisma migrate / seed (bypasses RLS).
      DIRECT_URL:       postgresql://${DB_USER:-cmc}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-cmc}?schema=public
      REDIS_URL:        redis://redis:6379
      JWT_SECRET:       ${JWT_SECRET:?JWT_SECRET is required}
      AUTH_COOKIE_NAME: cmc.session
      # Session cookies default to Secure (HTTPS-only). Set COOKIE_SECURE=false when serving
      # over plain HTTP (e.g. http://localhost) or the browser will drop the cookie and login
      # will silently fail. Behind real TLS, leave it unset/true.
      COOKIE_SECURE:    ${COOKIE_SECURE:-}
      # Allowed CORS origins (comma-separated). Must include all frontend origins.
      # In a single-nginx setup everything is same-origin, but set it anyway.
      CORS_ORIGINS:     ${CORS_ORIGINS:-http://localhost}
      # Public ERP origin used in outbound email links (e.g. the staff welcome email "Mở hệ thống"
      # button). Set to the real domain in prod, e.g. https://erp.cmcvn.edu.vn. Without this the API
      # falls back to a localhost dev URL, so a production welcome email would link to localhost.
      ADMIN_APP_ORIGIN: ${ADMIN_APP_ORIGIN:-http://localhost}
      CRM_LEAD_TOKEN:   ${CRM_LEAD_TOKEN:-}
      DISABLE_CRON:     ${DISABLE_CRON:-0}
      # ── Staff SSO (Microsoft Entra, OIDC) ──────────────────────────────────────
      # SSO stays OFF (login route returns 503 "SSO chưa được cấu hình") until ALL of:
      # ENTRA_TENANT_ID + ENTRA_CLIENT_ID + ENTRA_CLIENT_SECRET + ERP_SSO_REDIRECT_URI +
      # STAFF_EMAIL_DOMAIN are set. ERP_SSO_REDIRECT_URI must EXACTLY match the Redirect URI
      # registered in Entra (e.g. http://localhost/api/auth/sso/callback for a local test, or
      # https://erp.cmcvn.edu.vn/api/auth/sso/callback for prod). All default empty → SSO disabled.
      ENTRA_TENANT_ID:      ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID:      ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET:  ${ENTRA_CLIENT_SECRET:-}
      ERP_SSO_REDIRECT_URI: ${ERP_SSO_REDIRECT_URI:-}
      STAFF_EMAIL_DOMAIN:   ${STAFF_EMAIL_DOMAIN:-}
      # SSO availability is gated purely by the presence of the ENTRA_* config above (the /auth/sso
      # routes 503 until it is set). SSO_ENABLED no longer gates password login — that is now
      # STAFF_PASSWORD_LOGIN below (kept here only for backward compatibility / external tooling).
      SSO_ENABLED:          ${SSO_ENABLED:-}
      # Fail-closed by default: only super_admin may password-login; all other staff are SSO-only.
      # Set STAFF_PASSWORD_LOGIN=true ONLY for a local/seed environment that needs staff password login.
      STAFF_PASSWORD_LOGIN: ${STAFF_PASSWORD_LOGIN:-}
      # ── Microsoft Graph outbound email (welcome / OTP / payslip) ───────────────
      # No-op until ENTRA_* (reused as Graph creds) + all three sender mailboxes are set.
      GRAPH_SENDER_NOTIFY:  ${GRAPH_SENDER_NOTIFY:-}
      GRAPH_SENDER_PAYROLL: ${GRAPH_SENDER_PAYROLL:-}
      GRAPH_SENDER_HR:      ${GRAPH_SENDER_HR:-}
      # ── Callio call-metrics sync (optional; no-op if unset) ────────────────────
      CALLIO_API_BASE:      ${CALLIO_API_BASE:-}
      CALLIO_API_TOKEN:     ${CALLIO_API_TOKEN:-}
      # ── PDF blob store driver (disk|s3) ─────────────────────────────────────────
      # Defaults to 'disk' (unchanged behavior). Flip to 's3' only after running
      # scripts/migrate-pdf-blobs-to-s3.ts and verifying objects — see plan phase-04.
      PDF_STORE_DRIVER:     ${PDF_STORE_DRIVER:-disk}
      PDF_STORE_DIR:        ${PDF_STORE_DIR:-}
      S3_ENDPOINT:          ${S3_ENDPOINT:-}
      S3_BUCKET:            ${S3_BUCKET:-}
      S3_ACCESS_KEY:        ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY:        ${S3_SECRET_KEY:-}
      S3_REGION:            ${S3_REGION:-}
      S3_FORCE_PATH_STYLE:  ${S3_FORCE_PATH_STYLE:-true}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── One-off: run Prisma migrations (use profiles to avoid starting with up) ─
  api-migrate:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV:     production
      # Migrations run as owner (DB_USER) to create cmc_app role and apply DDL.
      # cmc_app does not exist yet on first deploy, so DATABASE_URL must use owner.
      DATABASE_URL: postgresql://${DB_USER:-cmc}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-cmc}?schema=public
      DIRECT_URL:   postgresql://${DB_USER:-cmc}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-cmc}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: ['pnpm', '--filter', '@cmc/db', 'migrate']
    profiles: ['migrate']
    restart: 'no'

  # ── One-off: seed super-admin (idempotent) ──────────────────────────────────
  # Runs in bootstrap mode: seeds ONLY HQ facility + IT-head super_admin.
  # All other accounts are created via the UI by the IT head.
  api-seed:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV:                production
      DATABASE_URL:            postgresql://${DB_USER:-cmc}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-cmc}?schema=public
      DIRECT_URL:              postgresql://${DB_USER:-cmc}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-cmc}?schema=public
      SEED_SUPERADMIN_EMAIL:    ${SEED_SUPERADMIN_EMAIL:?SEED_SUPERADMIN_EMAIL is required for seeding}
      SEED_SUPERADMIN_PASSWORD: ${SEED_SUPERADMIN_PASSWORD:?SEED_SUPERADMIN_PASSWORD is required for seeding}
      SEED_MODE:               bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    command: ['pnpm', '--filter', '@cmc/db', 'seed']
    profiles: ['seed']
    restart: 'no'

  # ── Admin SPA (catch-all at /) ───────────────────────────────────────────────
  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped

  # ── LMS SPA (at /lms/) ───────────────────────────────────────────────────────
  lms:
    build:
      context: ..
      dockerfile: apps/lms/Dockerfile
      args:
        VITE_API_URL:  /api
        VITE_BASE_URL: /lms/
    restart: unless-stopped

  # ── MinIO (S3-compatible blob store for exercise PDFs) ──────────────────────
  # Idle by default: only used once PDF_STORE_DRIVER=s3 is set on the api service
  # (after running scripts/migrate-pdf-blobs-to-s3.ts). Not exposed publicly —
  # accessed only by the api container over the compose network.
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER:     ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    profiles: ['minio']

  # One-off: bootstrap the private PDF bucket (no public read).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      mc mb -p local/${S3_BUCKET:?S3_BUCKET is required}
      "
    profiles: ['minio']

  # ── Nginx reverse proxy (only public port) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_started
      lms:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
