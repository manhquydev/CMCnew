# Outer nginx reverse proxy.
#
# Routing table:
#   /api/       → api:4000  (strips prefix; handles tRPC, SSE, files, upload, health)
#   /teaching/  → teaching:80 (strips prefix; assets served with /teaching/ base)
#   /lms/       → lms:80      (strips prefix; assets served with /lms/ base)
#   /           → admin:80    (catch-all)
#
# Path stripping: the trailing slash on proxy_pass URI causes nginx to replace
# the matched location prefix with the URI, e.g. /api/trpc/... → /trpc/...
#
# SSE (Server-Sent Events) for notifications lives at /api/sse/notifications.
# Buffering is disabled and timeouts are extended for all /api/ traffic so SSE
# streams are not interrupted.

upstream api_backend {
    server api:4000;
}

server {
    listen 80;

    # ── API (tRPC + SSE + file endpoints + health) ────────────────────────────
    # The Hono app serves at root paths (/trpc/*, /sse/*, /files/*, /upload/*, /health).
    # Frontend apps call VITE_API_URL (/api) so requests arrive here as /api/...
    location /api/ {
        proxy_pass         http://api_backend/;
        proxy_http_version 1.1;
        # Keep-alive passthrough — required for SSE (Connection must not be "close")
        proxy_set_header   Connection       '';
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE requires no buffering
        proxy_buffering    off;
        proxy_cache        off;
        # Long timeouts for SSE keep-alive streams (cron ping every 25 s)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        # Allow large PDF uploads (exercise base PDFs)
        client_max_body_size 20M;
    }

    # ── Teaching app (/teaching/ prefix stripped before proxying) ─────────────
    location /teaching/ {
        proxy_pass        http://teaching:80/;
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── LMS app (/lms/ prefix stripped before proxying) ──────────────────────
    location /lms/ {
        proxy_pass        http://lms:80/;
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Admin app (catch-all) ─────────────────────────────────────────────────
    location / {
        proxy_pass        http://admin:80;
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
