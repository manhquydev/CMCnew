# CMCnew — PRODUCTION SERVER compose (two domains + TLS).
# Authoritative file for the live VPS (erp.cmcvn.edu.vn + hoc.cmcvn.edu.vn).
# The sibling docker-compose.prod.yml stays the single-origin HTTP file for local prod-like runs.
#
# TLS: canonical strategy is a self-signed origin SAN cert behind Cloudflare "Full" mode,
# self-provisioned by scripts/ensure-origin-cert.sh on every deploy (no manual pre-step).
# See docs/decisions/0029-canonical-origin-tls-self-signed-behind-cloudflare.md.
# Real Let's Encrypt is kept as a documented ALTERNATE path (Cloudflare "Full (strict)" only):
# run scripts/prod-tls-bootstrap.sh once, then start this stack with `--profile le` so the
# certbot renewal service runs. Default deploys (no --profile le) leave certbot dormant.
#
# Deploy (from repo root on the server):
#   cp .env.production.example .env.production && edit it   (or use scripts/gen-prod-env.sh)
#   # 1. origin cert — self-signed (default, no pre-step) or LE alternate:
#   #    bash scripts/prod-tls-bootstrap.sh   (LE alternate only, port 80 free, then add --profile le below)
#   # 2. db up → migrate → seed (super_admin + 2 directors) → all services:
#   docker compose -f docker/docker-compose.prod.tls.yml --env-file .env.production up -d postgres
#   docker compose -f docker/docker-compose.prod.tls.yml --env-file .env.production --profile migrate run --rm api-migrate
#   docker compose -f docker/docker-compose.prod.tls.yml --env-file .env.production --profile seed    run --rm api-seed
#   docker compose -f docker/docker-compose.prod.tls.yml --env-file .env.production up -d

name: cmcnew-prod

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${DB_USER:-cmc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB:       ${DB_NAME:-cmc}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-cmc} -d ${DB_NAME:-cmc}']
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1g
        reservations:
          memory: 512m
    restart: unless-stopped

  # Rate limiter is currently in-process (apps/api/src/lib/rate-limit.ts), REDIS_URL is
  # declared-but-unused — this is a placeholder ceiling, not tuned against real traffic.
  # Re-review maxmemory/policy the first time redis is actually wired up.
  redis:
    image: redis:7-alpine
    command: ['redis-server', '--maxmemory', '200mb', '--maxmemory-policy', 'allkeys-lru']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256m
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV:         production
      API_PORT:         4000
      # Deploy markers surfaced at GET /health so a deploy is externally verifiable.
      # Jenkins exports these from $GIT_COMMIT + build time; default 'unknown' if unset.
      APP_COMMIT:       ${APP_COMMIT:-unknown}
      APP_BUILT_AT:     ${APP_BUILT_AT:-unknown}
      DATABASE_URL:     postgresql://cmc_app:${DB_APP_PASSWORD:?DB_APP_PASSWORD is required}@postgres:5432/${DB_NAME:-cmc}?schema=public
      DIRECT_URL:       postgresql://${DB_USER:-cmc}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-cmc}?schema=public
      REDIS_URL:        redis://redis:6379
      JWT_SECRET:       ${JWT_SECRET:?JWT_SECRET is required}
      AUTH_COOKIE_NAME: cmc.session
      # Behind real TLS → leave COOKIE_SECURE=true (default) so the session cookie is HTTPS-only.
      COOKIE_SECURE:    ${COOKIE_SECURE:-true}
      CORS_ORIGINS:     ${CORS_ORIGINS:?CORS_ORIGINS is required (https://erp...,https://teacher...,https://hoc...)}
      ADMIN_APP_ORIGIN: ${ADMIN_APP_ORIGIN:?ADMIN_APP_ORIGIN is required (https://erp.cmcvn.edu.vn)}
      STAFF_APP_ORIGINS: ${STAFF_APP_ORIGINS:-}
      CRM_LEAD_TOKEN:   ${CRM_LEAD_TOKEN:-}
      DISABLE_CRON:     ${DISABLE_CRON:-0}
      ENTRA_TENANT_ID:      ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID:      ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET:  ${ENTRA_CLIENT_SECRET:-}
      ERP_SSO_REDIRECT_URI: ${ERP_SSO_REDIRECT_URI:-}
      STAFF_EMAIL_DOMAIN:   ${STAFF_EMAIL_DOMAIN:-}
      SSO_ENABLED:          ${SSO_ENABLED:-}
      # Fail-closed: only super_admin may password-login; all other staff are SSO-only.
      STAFF_PASSWORD_LOGIN: ${STAFF_PASSWORD_LOGIN:-}
      GRAPH_SENDER_NOTIFY:  ${GRAPH_SENDER_NOTIFY:-}
      GRAPH_SENDER_PAYROLL: ${GRAPH_SENDER_PAYROLL:-}
      GRAPH_SENDER_HR:      ${GRAPH_SENDER_HR:-}
      GRAPH_CLIENT_SECRET:  ${GRAPH_CLIENT_SECRET:-}
      BREVO_API_KEY:        ${BREVO_API_KEY:-}
      BREVO_SENDER_EMAIL:   ${BREVO_SENDER_EMAIL:-}
      BREVO_SENDER_NAME:    ${BREVO_SENDER_NAME:-}
      CALLIO_API_BASE:      ${CALLIO_API_BASE:-}
      CALLIO_API_TOKEN:     ${CALLIO_API_TOKEN:-}
    volumes:
      # Host bind-mounts (NOT a named volume) — scripts/backup-db.sh tars these directly off
      # the host filesystem (PDF_STORE_DIR/SESSION_PHOTO_STORE_DIR, see its own comment). Without
      # these mounts, photo-store.ts/pdf-store.ts write into the container's writable layer only —
      # lost on every redeploy (image rebuild recreates the container) and invisible to backups.
      - ../.data/pdf:/app/apps/api/.data/pdf
      - ../.data/session-photos:/app/apps/api/.data/session-photos
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1g
        reservations:
          memory: 384m
    restart: unless-stopped

  api-migrate:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://${DB_USER:-cmc}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-cmc}?schema=public
      DIRECT_URL:   postgresql://${DB_USER:-cmc}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-cmc}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: ['pnpm', '--filter', '@cmc/db', 'migrate']
    profiles: ['migrate']
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768m
    restart: 'no'

  api-seed:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV:                 production
      DATABASE_URL:             postgresql://${DB_USER:-cmc}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-cmc}?schema=public
      DIRECT_URL:               postgresql://${DB_USER:-cmc}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-cmc}?schema=public
      SEED_SUPERADMIN_EMAIL:    ${SEED_SUPERADMIN_EMAIL:?SEED_SUPERADMIN_EMAIL is required}
      SEED_SUPERADMIN_PASSWORD: ${SEED_SUPERADMIN_PASSWORD:?SEED_SUPERADMIN_PASSWORD is required}
      SEED_MODE:                bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    command: ['pnpm', '--filter', '@cmc/db', 'seed']
    profiles: ['seed']
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768m
    restart: 'no'

  # Admin SPA — served at the root of erp.cmcvn.edu.vn.
  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_URL: /api
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128m
    restart: unless-stopped

  # LMS SPA — served at the ROOT of hoc.cmcvn.edu.vn (base path /, not /lms/).
  lms:
    build:
      context: ..
      dockerfile: apps/lms/Dockerfile
      args:
        VITE_API_URL:  /api
        VITE_BASE_URL: /
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128m
    restart: unless-stopped

  # Nginx reverse proxy — terminates TLS for both domains.
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # Absolute stable host path so a Jenkins deploy (which runs compose from its
      # ephemeral workspace) doesn't mount the config from a dir cleanWs() will delete.
      - /root/cmcnew/docker/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_started
      lms:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128m
        reservations:
          memory: 32m
    restart: unless-stopped
    # `default` keeps prod service + cmcnew-jenkins (ci vhost) resolution unchanged;
    # `cmcnew-edge` additionally lets this same nginx reach the cmcnew-dev app tier.
    networks:
      - default
      - cmcnew-edge

  # Certbot — ALTERNATE-path renewal only (real Let's Encrypt cert obtained out-of-band by
  # scripts/prod-tls-bootstrap.sh). Meaningless for the canonical 10y self-signed cert, so it's
  # gated behind the `le` profile: dormant on default deploys, one fewer idle container.
  # Start explicitly with `--profile le` only when running the LE alternate path.
  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh
    command: ['-c', 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done']
    profiles: ['le']
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128m
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  letsencrypt:
  certbot_www:

networks:
  # Project default (cmcnew-prod_default) — all prod services + cmcnew-jenkins live here.
  default:
  # Shared edge network so the prod nginx can also reach the cmcnew-dev app tier
  # (dev-api/dev-admin/dev-lms via their cmcnew-dev-* aliases) WITHOUT reaching dev DB/Redis.
  # External — created out-of-band on the VPS before deploy: docker network create cmcnew-edge.
  cmcnew-edge:
    external: true
