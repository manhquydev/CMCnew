# CMCnew — production reverse proxy (two domains, TLS).
#
#   erp.cmcvn.edu.vn  → admin SPA  (+ /api → api:4000)
#   hoc.cmcvn.edu.vn  → lms SPA    (+ /api → api:4000)
#
# One Let's Encrypt SAN cert covers BOTH domains; its lineage is named after the
# first -d domain (erp.cmcvn.edu.vn), so both vhosts reference that path.
#
# First-deploy cert bootstrap (run BEFORE nginx starts, port 80 free):
#   docker run --rm -p 80:80 -v cmcnew-prod_letsencrypt:/etc/letsencrypt \
#     -v cmcnew-prod_certbot_www:/var/www/certbot certbot/certbot certonly \
#     --standalone -d erp.cmcvn.edu.vn -d hoc.cmcvn.edu.vn \
#     --email <ops> --agree-tos --no-eff-email
# Renewals use the webroot challenge below (no downtime) via the certbot service.

upstream api_backend {
    server api:4000;
}

# ── Shared proxy header set for /api (tRPC + SSE + uploads) ────────────────────
# (declared inline per-vhost below; kept identical between erp and hoc)

# ── HTTP :80 — ACME challenge + redirect everything else to HTTPS ──────────────
server {
    listen 80;
    server_name erp.cmcvn.edu.vn hoc.cmcvn.edu.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Security headers shared by both HTTPS vhosts ──────────────────────────────
# (nginx has no include-from-string; repeated in each server block.)

# ── HTTPS :443 — ERP (admin) ──────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name erp.cmcvn.edu.vn;

    ssl_certificate     /etc/letsencrypt/live/erp.cmcvn.edu.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.cmcvn.edu.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options          "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    location /api/ {
        proxy_pass         http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 20M;
    }

    location / {
        proxy_pass        http://admin:80;
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── HTTPS :443 — LMS ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name hoc.cmcvn.edu.vn;

    ssl_certificate     /etc/letsencrypt/live/erp.cmcvn.edu.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.cmcvn.edu.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options          "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    location /api/ {
        proxy_pass         http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 20M;
    }

    location / {
        proxy_pass        http://lms:80;
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
